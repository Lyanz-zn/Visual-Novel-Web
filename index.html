<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Journey</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="vn-container">
      <div id="about-card-1" class="card hidden">
        <h1>Muhamad Sultan Hafidz</h1>
        <br />
        <p>Nim: 146251021</p>
      </div>

      <div id="about-card-2" class="card hidden">
        <h1>Juliantoro</h1>
        <br />
        <p>Nim: 146251016</p>
      </div>

      <div id="vn-bg"></div>

      <div id="vn-grain"></div>

      <div id="vn-overlay"></div>

      <div id="char-area">
        <div id="char-placeholder">
          <span>Character<br />Placeholder</span>
        </div>
      </div>

      <button id="back-btn" disabled title="Kembali ke dialog sebelumnya">
        <span class="back-icon">◂</span> Rewind
      </button>

      <div id="options-wrap"></div>

      <div id="dialog-area">
        <div id="speaker-name-wrap">
          <span id="speaker-name"></span>
        </div>

        <div id="text-box">
          <p id="dialog-text"></p>

          <span id="text-cursor">▼</span>
        </div>
      </div>
    </div>

    <script src="engine.js"></script>
    <script src="quiz.js"></script>
  </body>
</html>
